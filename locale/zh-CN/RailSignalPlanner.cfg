[mod-name]
RailSignalPlanner=铁路信号规划器

[mod-description]
RailSignalPlanner=在铁路和交叉口上自动放置铁路信号与铁路链信号，支持建造铁路时同步放置信号。

[rail-signal-tool]
not-a-valid-entity=__1__ 不是有效的 __2__
not-an-item=__1__ 不是物品
cant-place=无法放置 __1__

conflicting-directions=无法连接轨道方向不同的铁路
not-unidirectional=无法放置会创建双向轨道的铁路

[item-name]
rail-signal-planner=铁路信号规划器

[item-description]
rail-signal-planner=在铁路和交叉口上放置铁路信号和铁路链信号。
rsp-regular-behaviour=按住 __1__ 并拖动以在轨道上放置信号。
rsp-alt-behaviour=按住 __1__ 以反转“__2__”设置。
rsp-cancel-construction-jobs=按住 __1__ 并拖动以取消建造任务。
rsp-drag-to-deconstruct=按住 __1__ 并拖动以拆除信号。

[rsp-gui]
rail-signal-planner=铁路信号规划器
rsp-menu-button-tooltip=铁路信号规划器设置
tooltip-rail-signal=铁路信号 - 要使用的铁路信号实体
tooltip-rail-chain-signal=铁路链信号 - 要使用的铁路链信号实体
tooltip-wagon-length=最长列车的机车和车厢数量
wagon-length-label=列车长度（机车数 + 车厢数）
tooltip-train-length=列车的长度（格数）- 提供车厢数量时会自动计算
train-length-label=列车长度（格）
tooltip-rail-distance=长直道段上铁路信号之间的间隔距离
rail-distance-label=铁路信号距离（格）
place-signals-with-rail-planner=建造铁路时同时放置信号
place-signals-with-rail-planner-tooltip=在建造铁路的同时放置信号。\n当在可触及范围内时，信号会从库存中取出/放入，否则使用蓝图/升级/拆除标记。\n不适用于蓝图轨道。\n适用于蓝图信号，但在决定哪些铁路应纳入计算时不会考虑蓝图信号，因此没有信号或只有蓝图信号的铁路网络会比较影响性能。__1__
force-unidirectional=仅限单向铁路
force-unidirectional-tooltip=如果尝试放置双向铁路则报错。\n这可以略微提升性能，并且不会将模糊的铁路标记为双向。\n不会在没有信号的铁路线上建造信号。__1__
force-build-rails=即使方向冲突也建造铁路
force-build-rails-tooltip=禁用时，当铁路方向冲突时不允许建造铁路。仍可使用蓝图/机器人来建造。\n启用时，即使铁路方向不一致也会放置铁路（原版行为），同时禁用这样做时出现的错误消息。在两种情况下，如果铁路方向冲突，都不会放置信号。__1__

[controls]
rsp-custom-control=（__1__）
give-rail-signal-planner=制作新的铁路信号规划器
rsp-open-menu=打开或关闭菜单
rsp-toggle-place-signals-with-planner=切换建造铁路时是否同时放置信号
rsp-toggle-unidirectional=切换“仅限单向铁路”模式

[mod-setting-name]
rsp-toggle-menu-icon=启用设置按钮

[mod-setting-description]
rsp-toggle-menu-icon=从左上角菜单中移除设置按钮。可以通过再次切换此菜单或右键点击物品栏中的铁路信号规划器物品来打开设置。