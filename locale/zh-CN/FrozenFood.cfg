[recipe-description]
s6x-clean-container=冷冻产品最终会变质。如果发生这种情况，你可以清洗容器并回收它。

[technology-name]
s6x-freeze-preservation=瞬间冷冻
s6x-freeze-preservation-living=冷冻保存

[technology-description]
s6x-freeze-preservation=快速冷冻易腐产品，以大幅延长保鲜时间。
s6x-freeze-preservation-living=允许安全冷冻和复苏活体。

[mod-setting-name]
s6x-spoilage=冷冻食品腐烂时间
s6x-freeze-time=所需时间
s6x-container-recipe=冷冻容器配方
s6x-freezer-efficiency=效率
s6x-biochamber-allow=允许在生物舱中解冻
s6x-biochamber-productivity=允许生物舱生产力加成

[mod-setting-description]
s6x-freezer-efficiency=增加挑战。低于 1.0 时，部分解冻尝试会失败。例如，效率为 0.9 表示解冻配方有 90% 的成功概率。
s6x-biochamber-productivity=通常情况下，在生物舱中解冻容器会增加其生产力加成，这可能会让游戏变得过于简单。

[string-mod-setting]
s6x-spoilage-default=默认
s6x-spoilage-extra=超长（10x）
s6x-spoilage-off=禁用
s6x-container-recipe-plastic=塑料棒
s6x-container-recipe-lds=低密度结构
