[mod-name]
spoilage-scanner=腐坏扫描仪

[mod-description]
spoilage-scanner=添加一种腐坏运算器，用于检测实体内物品的新鲜度，可读取全部物品的平均新鲜度，或最新鲜/最不新鲜槽位的新鲜度。

[entity-name]
spoilage-scanner=腐坏扫描仪

[mod-setting-name]
spoilage-sensor-invert-output=反转新鲜度/腐坏输出
spoilage-sensor-signal-update-interval=更新间隔
spoilage-sensor-signal-scan-interval=扫描间隔

[gui]
spoilage-sensor-title=扫描仪设置
spoilage-sensor-target=已找到目标
spoilage-sensor-no-target=无目标
spoilage-sensor-average=平均值
spoilage-sensor-least=最不新鲜
spoilage-sensor-most=最新鲜