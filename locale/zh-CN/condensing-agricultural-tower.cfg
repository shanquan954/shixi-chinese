[mod-name]
condensing-agricultural-tower=冷凝农业塔

[mod-description]
condensing-agricultural-tower=增加了一种新型农业塔，可从植物中收集流体，流体储存在塔内的储罐中。

[entity-name]
condensing-agricultural-tower=冷凝农业塔
hidden-condensing-agricultural-tower-tank=冷凝农业塔储罐

[entity-description]
condensing-agricultural-tower=种植种子并收获作物，每次收获时冷凝一种流体并储存在内部储罐中。储罐满后，多余的流体将无法储存。更多信息请查看百科。
hidden-condensing-agricultural-tower-tank=最多可储存 30k 收获产生的流体。

[factoriopedia-description]
condensing-agricultural-tower=种植种子并收获作物，每次收获时冷凝一种流体并储存在内部储罐中。储罐满后，多余的流体将无法储存。
condensing-tree=\n收获 [entity=tree-plant] 可冷凝 2000 [fluid=水]（153.3/秒）
condensing-yumako=\n收获 [entity=yumako-tree] 可冷凝 810 [fluid=蒸汽]（165 °C）（62.1/秒）
condensing-jellynut=\n收获 [entity=jellystem] 可冷凝 420 [fluid=润滑油]（32.2/秒）

