[entity-name]
dynamic-rain-pollution-cleaner=降雨

[entity-description]
dynamic-rain-pollution-cleaner=下雨时清除污染。

[mod-setting-description]
rain-wet-min-hours=降雨可能持续的最短时间（游戏内小时）
rain-wet-max-hours=降雨可能持续的最长时间（游戏内小时）
rain-wet-power=控制短时降雨与长时降雨的概率分布。\n= 1 均匀分布（所有时长概率相等）；\n> 1 短时降雨更常见；\n< 1 长时降雨更常见
rain-dry-mean-hours=降雨之间干旱期的平均持续时间（游戏内小时）。数值越小，降雨越频繁
rain-intensity=雨滴数量。数值越大表示雨越大
min-thunder-chance=数值越小，雷暴发生概率越低
max-thunder-chance=数值越大，雷暴在高峰期发生频率越高
rain-volume-modifier=雨声音量倍数（0 到 1）
thunder-volume-modifier=雷声音量倍数（0 到 1）
fire-extinguish-enabled=下雨时扑灭火焰
rain-solar-power-multiplier=降雨期间太阳能板的效率百分比。\n-1 = 无影响；\n50% = 半效率；\n100% = 满效率；\n0% = 无发电
rain-pollution-cleanup-per-minute=下雨时每分钟每个区块清除的污染量（污染值/米）。\n0 = 禁用
rain-pollution-max-chunks-per-tick=每 tick 检查的污染清除区块数上限。数值越低性能越好；在大型地图上可能导致清除不够精确。