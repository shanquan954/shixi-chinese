[technology-description]
planet-discovery-arig=一颗炎热的星球，拥有广阔的沙漠，只有珍贵资源能在地下或沙子中找到。持续的沙尘暴使机器人无法使用，且大部分地表若不铺设合适的地基则不适合建造。（警告：该星球的货物投放功能需研究后解锁）
planetaris-cactus-wood=用仙人掌制作木材
planetaris-sand-sifting=筛分沙砾星的沙子以获取基础资源
planetaris-raw-diamond-production=允许你压缩钻石原矿
planetaris-compression=压缩材料以制造新物品
planetaris-glass=允许你制造玻璃
planetaris-heavy-glass=允许你制造厚玻璃
planetaris-compression-science=允许你深入研究压缩技术
planetaris-advanced-sand-sifting=允许你筛分方解石和更多纯净沙
planetaris-sandstone-foundation=允许你在沙砾星的沙子上建造
planetaris-simulating-unit=允许你制造模拟单元
planetaris-big-chest=更大的物品储存空间
planetaris-Logistics-4=更快的传送带
planetaris-automation-4=更快的组装机
planetaris-advanced-solar-panel=效率是基础太阳能板的两倍
planetaris-supported-solar-panel=专为在液体和不稳定表面上建造而设计的太阳能板和小型电线杆
planetaris-water-harvesting=能够从大气湿气中生产水的机器
rail-support-foundations-addon=以及在 [planet=arig] 上的深沙。

