[tips-and-tricks-item-description]
arig-briefing=[planet=arig] 是一颗炎热的星球，拥有广阔的沙漠，只有珍贵资源能在地下或用 [entity=offshore-pump] 在 [tile=arig-sand] 中找到。持续的沙尘暴使 [entity=roboport] 无法使用，且大部分地表若不使用 [item=planetaris-sandstone-foundation] 铺设地基则不适合建造。\n基础资源可通过在 [entity=planetaris-sifter] 中筛分 [fluid=planetaris-sand] 获得。\n可以将废弃物直接丢入 [tile=arig-sand] 中清除。\n货物投放功能在解锁相应科技前被锁定（[item=construction-robot] 除外）。
arig-exploring=在沙地上行走有时很困难，记住吃仙人掌是移动更快的好方法！只是要小心尖刺。
rail-support-deep-sand=一旦研究完 [technology=rail-support-foundations]，铁路支撑就可以建在 [tile=arig-deep-sand] 上

