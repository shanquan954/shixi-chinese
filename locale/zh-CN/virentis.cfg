eternal-lantern=装饰性灯笼，提供光照并为周围区域提供效率加成。放置多个不会提供额外加成。不计入信标上限。
windmill=风车，为周围区域提供生产力加成。距离起始区越远，加成越强。最高 +100% 生产力。

rockmalt-tree=外壳坚硬如石，但果肉柔软如布丁。
redbloom-tree=红色浆果，味道甜中带微辛。
mangroove-tree=柑橘类水果，甜中带酸。
nyxoleum-tree=一种非常富含油脂的植物，生长在沥青水洼中。它的油纯净到甚至可以用于烹饪。

