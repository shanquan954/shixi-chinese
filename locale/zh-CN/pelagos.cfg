[technology-description]
long-handed-diesel-inserter=柴油驱动的长型机械臂。无需电网，但消耗燃料。
fast-diesel-inserter=由柴油发动机驱动，速度远超电动版本。
pelagos-biodiesel=将加工后的生物质精炼成生物柴油，提供可持续的传统燃料替代品。
improvised-concrete=允许使用当地可用的生物质和分解材料制作简易混凝土。
project-diesel-dragon=柴油工程的巅峰：一个无视电网、用蛮力冲向轨道的液体燃料火箭发射井。解锁柴油巨龙。
coconut-drop-technology=即使尚未在 Cerys 表面炸开磁层破口，也能将椰子投放到那里；同时可以无视 Arig 的沙尘大气层，将椰子投放到该星球上。
pelagos-casting-engine-unit=直接用熔融铁和活性炭铸造发动机单元，跳过传统机械加工步骤。提供更高效的发动机冶金生产路线。

