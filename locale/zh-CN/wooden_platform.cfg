[tips-and-tricks-item-description]
wooden-platform=[item=wooden-platform] 是一种模块化水面建筑，可在水上放置指定机器与基础设施，将工厂扩展至湖泊、河流或海洋，但仅支持轻量且稳定的结构。\n支持对象包括：\n- [entity=pipe]\n- 装桶机\n- [entity=radar]\n- 机械臂\n- 传送带\n- 物流/仓储箱\n- 电路网络设备（运算器、灯等）\n- 机枪炮塔\n- [entity=flamethrower-turret]\n- 火箭炮塔\n- [entity=pump]（不含柴油泵）

