[mod-name]
its-about-time=计时！

[mod-description]
its-about-time=显示当前星球的游戏内时间时钟。

[controls]
itsabouttime-toggle-gui=切换时钟显示

[mod-setting-name]
itsabouttime-show-clock=显示时钟
itsabouttime-clock-precision=时钟精度（游戏内分钟）

[mod-setting-description]
itsabouttime-show-clock=是否显示游戏内时钟。
itsabouttime-clock-precision=此设置控制时钟以游戏内分钟为单位的更新频率。\n\n取决于所在星球，现实中的一秒可能对应多个游戏内分钟（在祝融星上每秒最多对应 16 个游戏内分钟）。过于频繁地更新时钟可能会导致视觉干扰和压迫感。\n\n使用“动态精度”时，精度会针对每个星球进行调整，大约每秒更新一次。

[string-mod-setting]
itsabouttime-clock-precision-auto=动态精度
itsabouttime-clock-precision-1=1 分钟（12:00、12:01、12:02）
itsabouttime-clock-precision-5=5 分钟（12:00、12:05、12:10）
itsabouttime-clock-precision-10=10 分钟（12:00、12:10、12:20）
itsabouttime-clock-precision-15=15 分钟（12:00、12:15、12:30）

[itsabouttime]
# 时间标签的标题和提示
time-caption-space=太空！
time-tooltip-frozen-daytime=此位面的时间流动已冻结。

# 位置图标的提示
location-tooltip-in-space=你正在穿越太空！\n嗖——！
location-tooltip-unknown-surface=这里既不是星球也不是太空平台。\n你在哪儿？
location-tooltip-space-location=[font=default-bold]位置：[/font] __1__
location-tooltip-planet-title=[font=default-bold]星球：[/font] __1__
location-tooltip-planet-data=[font=default-bold]日出：[/font] __1__\n[font=default-bold]白昼：[/font] __2__\n[font=default-bold]日落：[/font] __3__\n[font=default-bold]夜晚：[/font] __4__
location-tooltip-planet-no-data=登陆此星球以获取更多信息。

# 来自其他模组的位置提示
location-tooltip-blueprint-sandbox=这是一个蓝图沙盒。造点酷东西吧！
location-tooltip-drawing-board=回到绘图板！
location-tooltip-compact-circuits=你在一个微处理器内部。是不是很酷？！