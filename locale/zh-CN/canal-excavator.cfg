[mod-setting-name]
auto-deconstruct=自动标记拆除
no-tiles=不引入新地块

[mod-setting-description]
auto-deconstruct=当地块下方被标记为可挖掘时，自动标记该实体进行拆除。
no-tiles=Factorio 的地块原型数量上限为 255。某些模组（如 Alien Biomes）会添加大量地块，可能导致您达到 255 的上限。默认情况下，本模组添加两个地块："可挖掘"和"已挖掘"。启用此设置后，模组会复用 Factorio 的"黄色精炼混凝土"作为"可挖掘"地块，"棕色精炼混凝土"作为"已挖掘"地块。如果您使用的其他模组没有更改这两种地块类型，此设置仅为纯外观变更。

