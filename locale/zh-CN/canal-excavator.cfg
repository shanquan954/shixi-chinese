[command]
canex-transition-dug=强制所有已注册转换的地块进行转换。可修复转换过程中偶然丢失的情况。
canex-reset-partially-dug=所有部分挖掘后又被取消的地块会存储在一个表中，如果频繁发生可能会变得很大。此命令可清空该表。
canex-debug=[surfaceName] - 显示所有已挖掘、已注册转换和部分挖掘地块的状态。
canex-show-surface-config=[surfaceName] - 显示单个/所有地表配置。
canax-remove-floating=移除所有下方没有可挖掘地块的挖掘资源。当其他模组在未通知本模组的情况下移除了地块时，可能会发生这种情况。

[tips-and-tricks-item-description]
canex-excavator-tnt=要建造 [entity=canex-excavator]，您必须先放置 [item=canex-digable] 地块，然后将挖掘机建在其上。
canex-canals-tnt=当 [entity=canex-excavator] 从 [item=canex-digable] 中提取完所有资源后，水源旁边的已挖掘地块会转变为水体地块。\n不仅可以挖掘 [tile=water] 运河，水源的水体类型会被复制。
canex-canals-sa-tnt=\n在不同星球上挖掘可能会产生不同的结果。例如，在 [planet=gleba] 上挖掘会产出 [item=spoilage]。

