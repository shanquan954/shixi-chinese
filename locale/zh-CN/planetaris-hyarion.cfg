[tips-and-tricks-item-description]
hyarion-briefing=[planet=hyarion] 一颗由晶体和熔岩构成的星球，折射光线从天而降，摧毁地表。\n可以将废弃物直接移入 [tile=lava] 中清除。\n炽光星拥有自己的火箭发射井和火箭部件配方。
hyarion-refraction=[planet=hyarion] 拥有独特的发电方式。\n使用 [entity=planetaris-big-refraction-ray-collector] 收集 [fluid=planetaris-refraction-light]，然后铺设 [entity=planetaris-fiber-optics-cable] 将其传输至 [entity=planetaris-refraction-plant]。\n在 [item=planetaris-fluorite] 和 [fluid=planetaris-refraction-light] 的作用下产生 [fluid=planetaris-pure-light]，用于在 [entity=planetaris-refraction-generator] 中发电。\n此外，你可以生产 [item=planetaris-charged-fluorite] 将折射发电能力转移到任何地方。
hyarion-unstable-gem=[item=planetaris-unstable-gem] 是比 [item=cliff-explosives] 更好的选择，拥有更大的范围和伤害。

