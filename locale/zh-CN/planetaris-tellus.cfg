[tips-and-tricks-item-description]
tellus-briefing=[planet=tellus] 是一颗被细菌和寄生虫感染的星球，大气中的花粉帮助 [entity=small-wasp] 传播并腐蚀某些材料，通过更多关于蚀生星技术的研究，你可能会找到解决方案。\n叶绿体和菌丝体可以使用 [entity=condensing-agricultural-tower] 种植，并在 [entity=planetaris-bioassembler] 中加工。\n这里找不到 [entity=iron-ore]、[entity=copper-ore]、[entity=crude-oil]、[entity=coal] 和 [entity=uranium-ore]，但植物提供了生产所需物品的替代途径。\n大多数农业物品都伴随着随时间腐烂的额外挑战。即使是 [item=planetaris-bioengineering-science-pack] 也有有限的保质期，无法囤积。此外，病理学还带来了如果腐烂就会产生敌人的挑战，例如 [item=planetaris-pathological-science-pack] 会爆炸生成 [entity=big-wasp]。
tellus-bioassembler=[entity=planetaris-bioassembler] 允许进行蚀生星独有的加工和材料生产。\n[entity=planetaris-bioassembler] 是活的，需要用 [item=planetaris-bioassembler-seed] 在任何自然地面上种植。像所有植物一样，[entity=planetaris-bioassembler] 会死亡，在它们分解之前喂食 [item=nutrients] 即可复活。\n[entity=planetaris-bioassembler] 可以由 [entity=construction-robot] 放置。
tellus-roots=管道容易被花粉腐蚀，蚀生星机器无法连接到 [entity=pipe]，你需要创建 [entity=planetaris-root] 来运输流体。你可以使用 [entity=planetaris-root-filler] 将来自管道的流体注入根系。

