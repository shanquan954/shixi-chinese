[mod-name]
cargo-crates=货运集装箱

[mod-description]
cargo-crates=将大量物品和弹药打包进一次性货运集装箱，便于大宗物流与长途运输。每个集装箱可容纳一种物品的两组堆叠，太空时代下仅占火箭货舱 50% 容量。

[technology-name]
cargo-crates=货运集装箱
cargo-crates-zip=Zip 压缩档案

[technology-description]
cargo-crates=解锁一次性木质货运集装箱，可将物品紧凑打包后运输，必要时再拆箱取出。由于压缩包装，箱内物品只占普通火箭货物容量的 50%。
TFMG-cargo-crates=考虑一种更高效的物品打包方式。
cargo-crates-zip=将物品打包为 Zip 压缩档案，让火箭一次运送更多。

[item-name]
cargo-crate=货运集装箱（__1__ __2__）
cargo-crate-zip=__1__ __2__.zip

[recipe-name]
cargo-crate-unpack=拆箱取出物品（__1__ __2__）
cargo-crate-unpack-zip=解压 __1__ __2__.zip

[item-group-name]
cargo-crates=货运集装箱
cargo-crates-zip=Zip 压缩档案

[mod-setting-name]
cargo-crates-pack-ammo=允许打包弹药
cargo-crates-pack-equipment=允许打包装备
cargo-crates-pack-spoilables=允许打包易腐品
cargo-crates-pack-capsules=允许打包胶囊类物品
use-cargo-crates-zip-texture=使用 Zip 压缩档案材质
cargo-crates-packing-multiplier=集装箱打包倍率

[mod-setting-description]
cargo-crates-pack-ammo=允许将弹药打包进集装箱。关闭后会减少生成的物品和配方。
cargo-crates-pack-equipment=允许将装备打包进集装箱。关闭后会减少生成的物品和配方。
cargo-crates-pack-spoilables=允许将易腐物品打包进集装箱。关闭后会减少生成的物品和配方。
cargo-crates-pack-capsules=允许将胶囊类物品打包进集装箱。关闭后会减少生成的物品和配方。\n值得一提：可食用物品也属于胶囊类型。